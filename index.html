<style>
body{
font-family: Arial;
margin:0;
background:#f3f7f3;
}

header{
background:#1f3d2b;
color:white;
padding:20px;
text-align:center;
}

.products{
display:flex;
justify-content:center;
gap:20px;
padding:40px;
flex-wrap:wrap;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
width:250px;
text-align:center;
}

button{
background:#2f5d3a;
color:white;
border:none;
padding:10px 15px;
border-radius:5px;
cursor:pointer;
}

#paymentBox{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,0.3);
text-align:center;
}

input{
padding:10px;
width:80%;
margin:10px;
}

#result{
font-weight:bold;
margin-top:10px;
}
</style>
</head>

<body>

<header>
<h1>BONSAI 🌿</h1>
<p>Premium Bonsai Plants</p>
</header>

<section class="products">

<div class="card">
<h3>Ficus Bonsai</h3>
<p>₹1499</p>
<button onclick="openPayment()">Buy</button>
</div>

<div class="card">
<h3>Juniper Bonsai</h3>
<p>₹2299</p>
<button onclick="openPayment()">Buy</button>
</div>

<div class="card">
<h3>Japanese Maple Bonsai</h3>
<p>₹1999</p>
<button onclick="openPayment()">Buy</button>
</div>

</section>

<div id="paymentBox">
<h2>Dummy Payment</h2>

<input type="text" id="cardNumber" placeholder="Enter Card Number">

<br>

<button onclick="processPayment()">Pay</button>
<button onclick="closePayment()">Cancel</button>

<p id="result"></p>

</div>

<script>

function openPayment(){
document.getElementById("paymentBox").style.display="block";
}

function closePayment(){
document.getElementById("paymentBox").style.display="none";
document.getElementById("result").innerText="";
}

function processPayment(){

let card=document.getElementById("cardNumber").value.trim();

if(card === "1111 1111 1111"){
document.getElementById("result").style.color="green";
document.getElementById("result").innerText="✅ Payment Successful!";
}

else if(card === "2222222222222"){
document.getElementById("result").style.color="red";
document.getElementById("result").innerText="❌ Payment Failed!";
}

else{
document.getElementById("result").style.color="orange";
document.getElementById("result").innerText="⚠ Invalid Test Card";
}

}

</script>

</body>
